name: Daily Tender Scrape

on:
  schedule:
    - cron: "0 1 * * *"   # 09:00 MYT (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Clean previous database
        run: rm -f tenders.sqlite

      - name: Run scraper + export JSON
        run: npm run scrape:export

      - name: Show summary and guard
        run: |
          node -e "
            const d = require('./tenders.json');
            const count = d.tenders.length;
            console.log('Total tenders:', count);
            const by = {};
            d.tenders.forEach(t => { by[t.source_id] = (by[t.source_id]||0)+1; });
            Object.entries(by).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>console.log(' source',k+':',v));
            if (count < 5) { console.error('Too few tenders ('+count+') — aborting commit to protect existing data'); process.exit(1); }
          "

      - name: Commit updated tenders.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tenders.json public/tenders.json scraper/utils.js
          git diff --cached --quiet || git commit -m "chore: auto-scrape $(date -u +%Y-%m-%dT%H:%M)Z"
          git push
