name: Daily Tender Scrape

on:
  schedule:
    - cron: "0 1 * * *"   # 09:00 MYT (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium firefox --with-deps

      - name: Start Tor (residential exit node for WAF bypass)
        run: |
          sudo apt-get install -y tor
          sudo service tor start
          # Wait until Tor has bootstrapped a circuit
          for i in $(seq 1 30); do
            if sudo journalctl -u tor -n 20 --no-pager 2>/dev/null | grep -q "Bootstrapped 100%"; then
              echo "Tor ready"; break
            fi
            sleep 2
          done
          # Confirm SOCKS5 port is listening
          ss -tlnp | grep 9050 && echo "SOCKS5 on :9050 confirmed" || echo "WARNING: 9050 not open yet"

      - name: Run scraper + export JSON
        run: npm run scrape:export
        env:
          # Tor SOCKS5 proxy for sites that block GitHub Actions datacenter IPs.
          # Override with EPEROLEHAN_PROXY_URL secret to use a residential HTTP proxy instead.
          EPEROLEHAN_PROXY_URL: ${{ secrets.EPEROLEHAN_PROXY_URL || 'socks5://127.0.0.1:9050' }}

      - name: Show summary and guard
        run: |
          node -e "
            const d = require('./tenders.json');
            const prev = (() => { try { return require('child_process').execSync('git show HEAD:tenders.json 2>/dev/null').toString(); } catch { return null; } })();
            const prevCount = prev ? JSON.parse(prev).tenders.length : 0;
            const count = d.tenders.length;
            console.log('Previous count:', prevCount, '→ New count:', count);
            const by = {};
            d.tenders.forEach(t => { by[t.source_id] = (by[t.source_id]||0)+1; });
            Object.entries(by).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>console.log(' source',k+':',v));
            if (count < prevCount * 0.5 && prevCount > 10) {
              console.error('Count dropped by more than 50% ('+prevCount+'→'+count+') — aborting to protect existing data');
              process.exit(1);
            }
            if (count < 5) {
              console.error('Too few tenders ('+count+') — aborting');
              process.exit(1);
            }
            console.log('Guard passed — committing.');
          "

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tenders.json public/tenders.json tenders.sqlite
          git diff --cached --quiet || git commit -m "chore: auto-scrape $(date -u +%Y-%m-%dT%H:%M)Z"
          git push
