<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TenderTrack MY</title>
<meta name="description" content="Malaysia Tender Intelligence Dashboard">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --primary:#0077cc;--primary-dark:#005fa3;--primary-light:#e8f4fd;
  --success:#16a34a;--warning:#d97706;--danger:#dc2626;
  --radius:12px;--shadow:0 1px 4px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
button{cursor:pointer;font-family:inherit}a{color:var(--primary);text-decoration:none}

/* topbar */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.6rem .9rem;display:flex;align-items:center;gap:.6rem;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.logo{font-size:1rem;font-weight:800;color:var(--primary);white-space:nowrap;letter-spacing:-.3px}
.logo span{color:var(--text)}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;padding:.42rem .7rem .42rem 2rem;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;background:#f8fafc;outline:none;transition:all .15s}
.search-wrap input:focus{border-color:var(--primary);background:#fff}
.search-ico{position:absolute;left:.55rem;top:50%;transform:translateY(-50%);font-size:.8rem;color:var(--muted);pointer-events:none}
.topbar-r{display:flex;align-items:center;gap:.35rem;margin-left:auto;flex-shrink:0}
.notif-btn{background:none;border:none;padding:.35rem .45rem;border-radius:8px;font-size:1.05rem;color:var(--muted);position:relative}
.notif-btn:hover{background:var(--bg)}
.bdot{position:absolute;top:2px;right:3px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:2px solid #fff;display:none}
.bdot.on{display:block}
.add-btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:.38rem .85rem;font-size:.82rem;font-weight:700;white-space:nowrap}
.add-btn:hover{background:var(--primary-dark)}
.menu-btn{display:none;background:none;border:none;font-size:1.2rem;padding:.3rem .35rem;color:var(--text)}

/* layout */
.app{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:196px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:.65rem .45rem;display:flex;flex-direction:column;gap:.12rem}
.nl{font-size:.67rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:.5rem .7rem .2rem}
.nb{display:flex;align-items:center;gap:.5rem;padding:.44rem .7rem;border-radius:8px;color:var(--text);font-size:.86rem;border:none;background:none;width:100%;text-align:left;transition:background .12s}
.nb:hover{background:var(--bg)}
.nb.on{background:var(--primary-light);color:var(--primary);font-weight:600}
.nc{margin-left:auto;background:var(--primary);color:#fff;font-size:.67rem;font-weight:700;padding:.1rem .42rem;border-radius:10px;min-width:19px;text-align:center}
.main{flex:1;padding:.9rem;overflow-x:hidden;min-width:0}

/* stats */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:.55rem;margin-bottom:.85rem}
.stat{background:var(--surface);border:1px solid var(--border);border-top:3px solid transparent;border-radius:var(--radius);padding:.7rem .4rem;text-align:center;cursor:pointer;transition:all .15s}
.stat:hover,.stat.on{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.sn{font-size:1.55rem;font-weight:800;line-height:1}
.sl{font-size:.7rem;color:var(--muted);margin-top:.18rem;font-weight:500}
.st{border-top-color:var(--primary)}.st .sn{color:var(--primary)}
.sa{border-top-color:var(--success)}.sa .sn{color:var(--success)}
.su{border-top-color:var(--warning)}.su .sn{color:var(--warning)}
.so{border-top-color:var(--danger)}.so .sn{color:var(--danger)}
.ss{border-top-color:#f59e0b}.ss .sn{color:#f59e0b}

/* filters */
.fbar{display:flex;flex-wrap:wrap;gap:.45rem;align-items:center;margin-bottom:.75rem}
.chip{padding:.28rem .7rem;border:1.5px solid var(--border);border-radius:20px;font-size:.78rem;color:var(--muted);background:var(--surface);transition:all .12s;white-space:nowrap}
.chip:hover,.chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.src-sel{padding:.28rem .6rem;border:1.5px solid var(--border);border-radius:8px;font-size:.78rem;color:var(--text);background:var(--surface);outline:none}
.src-sel:focus{border-color:var(--primary)}

/* table */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.tbl-hd{display:flex;align-items:center;justify-content:space-between;padding:.6rem .9rem;border-bottom:1px solid var(--border)}
.tbl-hd h2{font-size:.88rem;font-weight:700}
.tbl-meta{font-size:.76rem;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:#f8fafc;padding:.5rem .7rem;text-align:left;font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:.55rem .7rem;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.tcell{max-width:260px}
.tlink{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);font-weight:500;background:none;border:none;padding:0;cursor:pointer;font-family:inherit;font-size:inherit;text-align:left;width:100%}
.tlink:hover{color:var(--primary)}
.reftxt{font-size:.69rem;color:var(--muted);margin-top:.08rem}
.stag{display:inline-flex;align-items:center;gap:.2rem;padding:.16rem .48rem;border-radius:4px;font-size:.7rem;font-weight:600;white-space:nowrap}
.pill{display:inline-block;padding:.16rem .5rem;border-radius:20px;font-size:.71rem;font-weight:700}
.p-active{background:#dcfce7;color:#15803d}
.p-upcoming{background:#fef3c7;color:#92400e}
.p-overdue{background:#fee2e2;color:#991b1b}
.ract{display:flex;gap:.15rem;justify-content:flex-end}
.ab{background:none;border:none;padding:.25rem .3rem;border-radius:5px;color:var(--muted);font-size:.88rem;transition:all .12s;line-height:1}
.ab:hover{background:var(--bg);color:var(--text)}
.ab.star{color:#f59e0b}.ab.bell{color:var(--primary)}

/* cards (mobile) */
.cards{display:none;flex-direction:column;gap:.6rem;padding:.65rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.8rem;box-shadow:var(--shadow)}
.card-top{display:flex;align-items:flex-start;gap:.4rem;margin-bottom:.45rem}
.card-title{font-size:.88rem;font-weight:600;color:var(--text);line-height:1.35;flex:1}
.card-title a{color:inherit}
.card-title a:hover{color:var(--primary)}
.cstar{background:none;border:none;font-size:1.05rem;color:#d1d5db;flex-shrink:0;padding:.05rem}
.cstar.on{color:#f59e0b}
.cmeta{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center;margin-bottom:.4rem}
.cfoot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.35rem;margin-top:.45rem;padding-top:.45rem;border-top:1px solid var(--border)}
.cdates{font-size:.74rem;color:var(--muted);display:flex;flex-direction:column;gap:.08rem}
.cacts{display:flex;gap:.25rem;align-items:center}
.cnbtn{background:none;border:none;font-size:.95rem;padding:.22rem .3rem;border-radius:6px;color:var(--muted)}
.cnbtn.on{color:var(--primary)}
.cedit{background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:.22rem .55rem;font-size:.76rem;color:var(--text);cursor:pointer}

/* category tag */
.cat-tag{display:inline-flex;align-items:center;gap:.2rem;padding:.18rem .52rem;border-radius:20px;font-size:.73rem;font-weight:600;background:#f1f5f9;color:#475569;white-space:nowrap}

/* pagination */
.pages{display:flex;align-items:center;gap:.28rem;padding:.75rem;justify-content:center;border-top:1px solid var(--border);flex-wrap:wrap}
.pg{padding:.28rem .55rem;border:1.5px solid var(--border);border-radius:6px;font-size:.78rem;background:var(--surface);color:var(--text);min-width:32px;text-align:center;transition:all .12s}
.pg:hover:not(:disabled){background:var(--bg)}
.pg.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.pg:disabled{opacity:.35;cursor:default}
.pgi{font-size:.76rem;color:var(--muted)}

/* shimmer */
.shimmer{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200%;animation:shim 1.4s infinite;border-radius:8px}
@keyframes shim{0%{background-position:200%}100%{background-position:-200%}}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
.empty-ico{font-size:2.2rem;margin-bottom:.45rem}
.empty h3{color:var(--text);margin-bottom:.28rem;font-size:.95rem}
.empty p{font-size:.82rem}

/* drawer */
.doverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:90}
.doverlay.on{display:block}
.drawer{position:fixed;left:0;top:0;bottom:0;width:210px;background:var(--surface);z-index:95;padding:.65rem .45rem;transform:translateX(-100%);transition:transform .22s cubic-bezier(.4,0,.2,1);border-right:1px solid var(--border);overflow-y:auto}
.drawer.on{transform:translateX(0)}
.drawer-close{background:none;border:none;font-size:1.25rem;padding:.25rem .45rem;color:var(--muted);float:right}

/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:540px;max-height:92vh;overflow-y:auto}
.mhd{padding:.9rem 1rem .65rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.mhd h3{font-size:.95rem;font-weight:700}
.mclose{background:none;border:none;font-size:1.35rem;line-height:1;color:var(--muted);padding:.1rem .28rem}
.mbody{padding:.9rem 1rem}
.fg{margin-bottom:.78rem}
.fg label{display:block;font-size:.78rem;font-weight:600;color:var(--text);margin-bottom:.28rem}
.fg input,.fg select{width:100%;padding:.44rem .65rem;border:1.5px solid var(--border);border-radius:8px;font-size:.86rem;font-family:inherit;background:#fff;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus{border-color:var(--primary)}
.drow{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.mft{padding:.65rem 1rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.45rem;position:sticky;bottom:0;background:var(--surface)}
.btn{padding:.44rem .95rem;border-radius:8px;font-size:.83rem;font-weight:600;border:none;cursor:pointer;transition:all .12s}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{background:var(--primary-dark)}
.btn-g{background:var(--bg);color:var(--text);border:1.5px solid var(--border)}.btn-g:hover{background:var(--border)}
.btn-d{background:var(--danger);color:#fff}.btn-d:hover{background:#b91c1c}

/* detail popup */
.det-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.det-overlay.on{display:flex}
.det-modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto}
.det-hd{padding:.9rem 1rem .65rem;display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.det-hd h3{font-size:.92rem;font-weight:700;line-height:1.35;flex:1}
.det-body{padding:.9rem 1rem}
.det-row{display:flex;gap:.5rem;margin-bottom:.6rem;font-size:.83rem;align-items:flex-start}
.det-lbl{min-width:82px;color:var(--muted);font-weight:600;font-size:.76rem;padding-top:.12rem}
.det-val{flex:1;color:var(--text)}
.det-divider{border:none;border-top:1px solid var(--border);margin:.6rem 0}
.det-ft{padding:.65rem 1rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.45rem;position:sticky;bottom:0;background:var(--surface)}
.det-link-btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:.48rem 1.1rem;font-size:.86rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:.35rem;text-decoration:none}
.det-link-btn:hover{background:var(--primary-dark)}
.det-link-btn.disabled{background:var(--muted);cursor:default;opacity:.7}
.det-badge{display:inline-flex;align-items:center;gap:.28rem;padding:.22rem .65rem;border-radius:20px;font-size:.76rem;font-weight:600}
/* notif panel */
.npanel{display:none;position:fixed;top:52px;right:.65rem;width:min(330px,calc(100vw - 1.3rem));background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);z-index:150;flex-direction:column;max-height:400px;overflow-y:auto}
.npanel.on{display:flex;flex-direction:column}
.nhd{padding:.6rem .9rem;border-bottom:1px solid var(--border);font-weight:600;font-size:.86rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface)}
.nitem{padding:.55rem .9rem;border-bottom:1px solid var(--border);display:flex;gap:.45rem;font-size:.8rem}
.nitem.unread{background:var(--primary-light)}
.ntxt{flex:1}
.ntitle{font-weight:600;font-size:.8rem}
.nsub{color:var(--muted);font-size:.72rem;margin-top:.08rem}
.nempty{padding:1.25rem;text-align:center;color:var(--muted);font-size:.82rem}

/* toast */
.toast{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%) translateY(70px);background:#1e293b;color:#fff;padding:.55rem 1rem;border-radius:8px;font-size:.82rem;z-index:999;opacity:0;transition:all .22s;white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}

/* sources */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:.65rem}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.8rem;box-shadow:var(--shadow)}
.schd{display:flex;align-items:center;gap:.45rem;margin-bottom:.4rem}
.sico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.sc h3{font-size:.82rem;font-weight:700}
.sci{font-size:.73rem;color:var(--muted);margin:.12rem 0}
.spill{display:inline-block;padding:.1rem .38rem;border-radius:3px;font-size:.67rem;font-weight:700;margin-top:.28rem}
.sok{background:#dcfce7;color:#15803d}.serr{background:#fee2e2;color:#991b1b}

/* pipeline */
.pc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem;margin-bottom:.65rem;box-shadow:var(--shadow)}
.pc h3{font-size:.88rem;font-weight:700;margin-bottom:.55rem}
.pchips{display:flex;flex-wrap:wrap;gap:.45rem;margin-bottom:.45rem}
.pchip{background:var(--bg);border-radius:6px;padding:.45rem .7rem;font-size:.78rem}
.pchip b{display:block;font-weight:600;margin-bottom:.12rem}
.pchip span{color:var(--muted)}
.logbox{font-size:.76rem;font-family:monospace;background:#f8fafc;border-radius:6px;padding:.6rem;max-height:160px;overflow-y:auto;line-height:1.6}

/* responsive */
@media(max-width:680px){
  .sidebar{display:none}
  .menu-btn{display:block}
  .stats{grid-template-columns:repeat(3,1fr)}
  .stats .stat:nth-child(n+4){display:none}
  table{display:none}
  .cards{display:flex}
  .add-btn .add-txt{display:none}
}
@media(max-width:400px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .stats .stat:nth-child(n+3){display:none}
  .main{padding:.55rem}
}
@media(min-width:681px){
  .overlay{align-items:center}
  .modal{border-radius:var(--radius);max-width:500px}
  .stats{grid-template-columns:repeat(5,1fr)}
}
</style>
</head>
<body>

<nav class="topbar">
  <button class="menu-btn" onclick="openDrawer()">☰</button>
  <div class="logo">Tender<span>Track</span> MY</div>
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input id="si" type="search" placeholder="Search tenders…" oninput="onSearch(this.value)" autocomplete="off">
  </div>
  <div class="topbar-r">
    <button class="notif-btn" onclick="toggleNotifPanel()" title="Notifications">🔔<span class="bdot" id="bdot"></span></button>
    <button class="add-btn" onclick="openModal()">＋ <span class="add-txt">Add</span></button>
  </div>
</nav>

<div class="doverlay" id="dov" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">×</button>
  <div style="clear:both;margin:.4rem 0"></div>
  <div class="nl">Views</div>
  <button class="nb on" id="mn-tenders" onclick="nav('tenders');closeDrawer()">📋 All Tenders <span class="nc" id="mcnt">0</span></button>
  <button class="nb" id="mn-active" onclick="nav('active');closeDrawer()">✅ Active</button>
  <button class="nb" id="mn-upcoming" onclick="nav('upcoming');closeDrawer()">⏳ Upcoming</button>
  <button class="nb" id="mn-overdue" onclick="nav('overdue');closeDrawer()">⚠️ Overdue</button>
  <button class="nb" id="mn-starred" onclick="nav('starred');closeDrawer()">⭐ Starred</button>
  <div class="nl">Tools</div>
  <button class="nb" id="mn-sources" onclick="nav('sources');closeDrawer()">🌐 Sources</button>
  <button class="nb" id="mn-pipeline" onclick="nav('pipeline');closeDrawer()">⚙️ Pipeline</button>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="nl">Views</div>
    <button class="nb on" id="dn-tenders" onclick="nav('tenders')">📋 All Tenders <span class="nc" id="dcnt">0</span></button>
    <button class="nb" id="dn-active" onclick="nav('active')">✅ Active</button>
    <button class="nb" id="dn-upcoming" onclick="nav('upcoming')">⏳ Upcoming</button>
    <button class="nb" id="dn-overdue" onclick="nav('overdue')">⚠️ Overdue</button>
    <button class="nb" id="dn-starred" onclick="nav('starred')">⭐ Starred</button>
    <div class="nl">Tools</div>
    <button class="nb" id="dn-sources" onclick="nav('sources')">🌐 Sources</button>
    <button class="nb" id="dn-pipeline" onclick="nav('pipeline')">⚙️ Pipeline</button>
  </aside>
  <main class="main" id="main"></main>
</div>

<div class="npanel" id="npanel">
  <div class="nhd"><span>Notifications</span>
    <button onclick="markAllRead()" style="font-size:.73rem;color:var(--primary);background:none;border:none;cursor:pointer">Mark all read</button>
  </div>
  <div id="nlist"><div class="nempty">No notifications</div></div>
</div>

<div class="toast" id="toast"></div>

<!-- Tender detail popup -->
<div class="det-overlay" id="det-overlay" onclick="if(event.target===this)closeDet()">
  <div class="det-modal" onclick="event.stopPropagation()">
    <div class="det-hd">
      <h3 id="det-title">—</h3>
      <button class="mclose" onclick="closeDet()">×</button>
    </div>
    <div class="det-body" id="det-body"></div>
    <div class="det-ft">
      <button class="btn btn-g" onclick="closeDet()">Close</button>
      <button class="btn btn-g" onclick="openEditFromDet()" style="display:none" id="det-edit-btn">✏️ Edit</button>
      <a id="det-link" href="#" target="_blank" rel="noopener noreferrer" class="det-link-btn" onclick="return handleDetLink(event)">🔗 Open Tender Link</a>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mhd"><h3 id="mtitle">Add Tender</h3><button class="mclose" onclick="closeModal()">×</button></div>
    <div class="mbody">
      <form id="tform" onsubmit="saveTender(event)">
        <input type="hidden" id="fid">
        <div class="fg"><label>Title *</label><input id="ftitle" required placeholder="Full tender title"></div>
        <div class="fg"><label>Source</label>
          <select id="fsrc">
            <option value="0">Manual Entry</option>
            <option value="1">ePerolehan</option><option value="2">Selangor</option>
            <option value="3">Penang</option><option value="4">Sarawak</option>
            <option value="5">Sabah</option><option value="6">SPSB</option>
            <option value="7">Perak S3PK</option><option value="8">Kedah</option>
            <option value="9">SESB</option><option value="10">Prasarana</option>
            <option value="11">TNB</option><option value="12">TM</option>
            <option value="13">Bursa Malaysia</option>
          </select>
        </div>
        <div class="fg"><label>Reference No.</label><input id="fref" placeholder="e.g. JKR/KL/2024/001"></div>
        <div class="drow">
          <div class="fg"><label>Open Date</label><input type="date" id="fopen"></div>
          <div class="fg"><label>Deadline</label><input type="date" id="fdeadline"></div>
        </div>
        <div class="fg"><label>URL / Link</label><input type="url" id="furl" placeholder="https://…"></div>
      </form>
    </div>
    <div class="mft">
      <button class="btn btn-g" onclick="closeModal()">Cancel</button>
      <button class="btn btn-d" id="delbtn" onclick="doDelete()" style="display:none">Delete</button>
      <button class="btn btn-p" onclick="document.getElementById('tform').dispatchEvent(new Event('submit',{cancelable:true,bubbles:true}))">Save</button>
    </div>
  </div>
</div>

<script>
const SRCS={
  1:{n:'ePerolehan',i:'🏛️',c:'#1d4ed8'},2:{n:'Selangor',i:'⭐',c:'#7c3aed'},
  3:{n:'Penang',i:'🏝️',c:'#0891b2'},4:{n:'Sarawak',i:'🌿',c:'#15803d'},
  5:{n:'Sabah',i:'🏔️',c:'#b45309'},6:{n:'SPSB',i:'📋',c:'#0284c7'},
  7:{n:'Perak S3PK',i:'🏗️',c:'#6d28d9'},8:{n:'Kedah',i:'🌾',c:'#065f46'},
  9:{n:'SESB',i:'⚡',c:'#c2410c'},10:{n:'Prasarana',i:'🚇',c:'#1e40af'},
  11:{n:'TNB',i:'💡',c:'#d97706'},12:{n:'TM',i:'📡',c:'#0f766e'},
  13:{n:'Bursa',i:'📈',c:'#dc2626'},
};
const S={page:'tenders',status:null,starred:false,q:'',src:'',cat:'',pn:1,lim:50,stats:{},notifs:[],mode:'static',data:null};

async function boot(){
  try{
    const r=await fetch('/api/stats',{signal:AbortSignal.timeout(3000)});
    if(r.ok){const j=await r.json();if(typeof j.total==='number'){S.stats=j;S.mode='api';}}
  }catch{}
  if(S.mode!=='api'){
    try{
      const r=await fetch('tenders.json',{signal:AbortSignal.timeout(8000)});
      if(r.ok){const txt=await r.text();const d=JSON.parse(txt);if(d&&Array.isArray(d.tenders)){S.data=d;S.mode='static';calcStats(d);}}
    }catch(e){console.warn('tenders.json:',e.message);}
  }
  if(!S.data){S.data={tenders:[],notifications:[]};calcStats(S.data);}
  updCnts();nav('tenders');loadNotifs();
}

function calcStats(d){
  const t=d.tenders||[];
  S.stats={total:t.length,active:t.filter(x=>x.status==='active').length,
    upcoming:t.filter(x=>x.status==='upcoming').length,overdue:t.filter(x=>x.status==='overdue').length,starred:t.filter(x=>x.starred).length};
}

function nav(pg){
  S.page=pg;S.pn=1;
  S.status=['active','upcoming','overdue'].includes(pg)?pg:null;
  S.starred=pg==='starred';
  ['tenders','active','upcoming','overdue','starred','sources','pipeline'].forEach(p=>{
    document.getElementById('dn-'+p)?.classList.toggle('on',p===pg);
    document.getElementById('mn-'+p)?.classList.toggle('on',p===pg);
  });
  if(pg==='sources')renderSrc();else if(pg==='pipeline')renderPipe();else renderTenders();
}

async function renderTenders(){
  const el=document.getElementById('main');
  el.innerHTML=statsHTML()+filterHTML()+'<div id="area"><div class="shimmer" style="height:200px"></div></div>';
  let td;
  try{
    if(S.mode==='api'){
      const p=new URLSearchParams({page:S.pn,limit:S.lim,...(S.q&&{q:S.q}),...(S.status&&{status:S.status}),...(S.src&&{source_id:S.src}),...(S.starred&&{starred:'1'})});
      const r=await fetch('/api/tenders?'+p);if(r.ok)td=await r.json();
    }
  }catch{}
  if(!td)td=localFilter();
  const area=document.getElementById('area');
  if(!td.data.length){
    area.innerHTML='<div class="empty"><div class="empty-ico">📋</div><h3>No tenders found</h3><p>Try a different filter</p></div>';return;
  }
  area.innerHTML=`<div class="tbl-wrap">
    <div class="tbl-hd"><h2>Tenders</h2><span class="tbl-meta">${td.total} results</span></div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th style="width:30px"></th><th>Title</th><th>Source</th><th>Category</th><th>Status</th><th>Deadline</th><th style="width:65px"></th></tr></thead>
      <tbody>${td.data.map(tRow).join('')}</tbody>
    </table></div>
    <div class="cards">${td.data.map(cRow).join('')}</div>
    ${pager(td.total)}</div>`;
}

function localFilter(){
  let d=(S.data?.tenders||[]).slice();
  if(S.q){const q=S.q.toLowerCase();d=d.filter(t=>t.title?.toLowerCase().includes(q)||(t.ref||'').toLowerCase().includes(q)||(t.category||'').toLowerCase().includes(q)||(t.ministry||'').toLowerCase().includes(q));}
  if(S.status)d=d.filter(t=>t.status===S.status);
  if(S.src)d=d.filter(t=>String(t.source_id)===String(S.src));
  if(S.cat)d=d.filter(t=>normCat(t.category||'')===S.cat);
  if(S.starred)d=d.filter(t=>t.starred);
  const s=(S.pn-1)*S.lim;return{total:d.length,data:d.slice(s,s+S.lim)};
}

function normCat(c){return c.trim().toLowerCase();}

function getCategories(){
  const cats=new Set();
  (S.data?.tenders||[]).forEach(t=>{if(t.category)cats.add(normCat(t.category));});
  return [...cats].sort();
}

function tRow(t){
  const s=SRCS[t.source_id]||{n:'Unknown',i:'📄',c:'#64748b'};
  const catIcon=catEmoji(t.category);
  return`<tr>
    <td><button class="ab ${t.starred?'star':''}" onclick="toggleStar(${t.id})">⭐</button></td>
    <td class="tcell"><button class="tlink" onclick="viewTender(${t.id})" title="${esc(t.title)}">${esc(t.title)}</button>${t.ref?`<div class="reftxt">${esc(t.ref)}</div>`:''}</td>
    <td><span class="stag" style="background:${s.c}18;color:${s.c}">${s.i} ${s.n}</span></td>
    <td>${t.category?`<span class="cat-tag">${catIcon} ${esc(cap(t.category))}</span>`:'<span style="color:var(--muted);font-size:.75rem">—</span>'}</td>
    <td><span class="pill p-${t.status||'active'}">${cap(t.status||'active')}</span></td>
    <td style="white-space:nowrap;font-size:.79rem">${fd(t.deadline)}</td>
    <td><div class="ract">
      <button class="ab ${t.notify?'bell':''}" onclick="toggleNotify(${t.id})" title="Notify">🔔</button>
      <button class="ab" onclick="openModal(${t.id})" title="Edit">✏️</button>
    </div></td></tr>`;
}

function cRow(t){
  const s=SRCS[t.source_id]||{n:'Unknown',i:'📄',c:'#64748b'};
  return`<div class="card">
    <div class="card-top">
      <div class="card-title"><button class="tlink" onclick="viewTender(${t.id})">${esc(t.title)}</button></div>
      <button class="cstar ${t.starred?'on':''}" onclick="toggleStar(${t.id})">⭐</button>
    </div>
    <div class="cmeta">
      <span class="stag" style="background:${s.c}18;color:${s.c}">${s.i} ${s.n}</span>
      <span class="pill p-${t.status||'active'}">${cap(t.status||'active')}</span>
      ${t.category?`<span class="cat-tag">${catEmoji(t.category)} ${esc(cap(t.category))}</span>`:''}
    </div>
    ${t.ref?`<div style="font-size:.71rem;color:var(--muted);margin-bottom:.3rem">${esc(t.ref)}</div>`:''}
    <div class="cfoot">
      <div class="cdates">
        ${t.deadline?`<span>📅 Deadline: <b>${fd(t.deadline)}</b></span>`:'<span>No deadline set</span>'}
        ${t.open_date?`<span>📂 Opens: ${fd(t.open_date)}</span>`:''}
      </div>
      <div class="cacts">
        <button class="cnbtn ${t.notify?'on':''}" onclick="toggleNotify(${t.id})">🔔</button>
        <button class="cedit" onclick="viewTender(${t.id})">View</button>
      </div>
    </div>
  </div>`;
}

function statsHTML(){
  const s=S.stats,f=S.status,st=S.starred;
  return`<div class="stats">
    <div class="stat st ${!f&&!st?'on':''}" onclick="setFilter(null,false)"><div class="sn">${s.total||0}</div><div class="sl">Total</div></div>
    <div class="stat sa ${f==='active'?'on':''}" onclick="setFilter('active',false)"><div class="sn">${s.active||0}</div><div class="sl">Active</div></div>
    <div class="stat su ${f==='upcoming'?'on':''}" onclick="setFilter('upcoming',false)"><div class="sn">${s.upcoming||0}</div><div class="sl">Upcoming</div></div>
    <div class="stat so ${f==='overdue'?'on':''}" onclick="setFilter('overdue',false)"><div class="sn">${s.overdue||0}</div><div class="sl">Overdue</div></div>
    <div class="stat ss ${st?'on':''}" onclick="setFilter(null,true)"><div class="sn">${s.starred||0}</div><div class="sl">Starred</div></div>
  </div>`;
}

function filterHTML(){
  const srcOpts=Object.entries(SRCS).map(([id,m])=>`<option value="${id}" ${S.src==id?'selected':''}>${m.n}</option>`).join('');
  const cats=getCategories();
  const catOpts=cats.map(c=>`<option value="${c}" ${S.cat===c?'selected':''}>${cap(c)}</option>`).join('');
  return`<div class="fbar">
    <button class="chip ${!S.status&&!S.starred?'on':''}" onclick="setFilter(null,false)">All</button>
    <button class="chip ${S.status==='active'?'on':''}" onclick="setFilter('active',false)">✅ Active</button>
    <button class="chip ${S.status==='upcoming'?'on':''}" onclick="setFilter('upcoming',false)">⏳ Upcoming</button>
    <button class="chip ${S.status==='overdue'?'on':''}" onclick="setFilter('overdue',false)">⚠️ Overdue</button>
    <button class="chip ${S.starred?'on':''}" onclick="setFilter(null,true)">⭐ Starred</button>
    <select class="src-sel" onchange="setSrc(this.value)"><option value="">All Sources</option>${srcOpts}</select>
    ${cats.length?`<select class="src-sel" onchange="setCat(this.value)"><option value="">All Categories</option>${catOpts}</select>`:''}
  </div>`;
}

function pager(total){
  const pages=Math.ceil(total/S.lim);if(pages<=1)return'';
  const cp=S.pn;
  let b=`<button class="pg" onclick="gp(${cp-1})" ${cp<=1?'disabled':''}>‹</button>`;
  for(let i=Math.max(1,cp-2);i<=Math.min(pages,cp+2);i++)b+=`<button class="pg ${i===cp?'on':''}" onclick="gp(${i})">${i}</button>`;
  b+=`<button class="pg" onclick="gp(${cp+1})" ${cp>=pages?'disabled':''}>›</button>`;
  return`<div class="pages"><span class="pgi">${total} total</span>${b}</div>`;
}

async function renderSrc(){
  const el=document.getElementById('main');
  el.innerHTML='<h2 style="margin-bottom:.7rem;font-size:.95rem">Data Sources</h2><div class="sgrid" id="sg"><div class="shimmer" style="height:90px"></div></div>';
  let rows=[];
  if(S.mode==='api'){try{const r=await fetch('/api/sources');if(r.ok)rows=await r.json();}catch{}}
  else if(S.data){
    const by={};S.data.tenders.forEach(t=>{by[t.source_id]=(by[t.source_id]||0)+1;});
    rows=Object.entries(by).map(([sid,n])=>({source_id:Number(sid),tender_count:n,error:null,scraped_at:S.data.exported_at}));
  }
  document.getElementById('sg').innerHTML=Object.entries(SRCS).map(([id,m])=>{
    const inf=rows.find(r=>r.source_id==id)||{};
    return`<div class="sc"><div class="schd"><div class="sico" style="background:${m.c}18;color:${m.c}">${m.i}</div><h3>${m.n}</h3></div>
      <div class="sci">${inf.tender_count||0} tenders</div>
      <div class="sci">Last: ${inf.scraped_at?fdt(inf.scraped_at):'Never'}</div>
      <span class="spill ${inf.error?'serr':'sok'}">${inf.error?'Error':'OK'}</span></div>`;
  }).join('');
}

async function renderPipe(){
  const el=document.getElementById('main');
  el.innerHTML=`<h2 style="margin-bottom:.7rem;font-size:.95rem">Data Pipeline</h2>
  <div class="pc"><h3>Architecture</h3>
    <div class="pchips">
      <div class="pchip"><b>🕷️ Scraper</b><span>Node.js + Axios + Cheerio</span></div>
      <div class="pchip"><b>🗄️ Storage</b><span>SQLite</span></div>
      <div class="pchip"><b>⏰ Schedule</b><span>Daily 09:00 MYT</span></div>
      <div class="pchip"><b>🌐 Export</b><span>tenders.json → Netlify</span></div>
    </div>
    <p style="font-size:.78rem;color:var(--muted)">Last export: ${S.data?.exported_at?fdt(S.data.exported_at):'Unknown'}</p>
  </div>
  <div class="pc"><h3>Scrape Logs</h3><div id="la"><div class="shimmer" style="height:70px"></div></div></div>
  <div class="pc"><h3>Manual Trigger</h3>
    <p style="font-size:.78rem;color:var(--muted);margin-bottom:.55rem">API mode only</p>
    <button class="btn btn-p" id="sbtn" onclick="triggerScrape()">▶ Run Now</button>
    <div id="sres" style="margin-top:.55rem;font-size:.78rem"></div>
  </div>`;
  if(S.mode==='api'){
    try{const r=await fetch('/api/sources');const rows=r.ok?await r.json():[];
      const la=document.getElementById('la');
      la.innerHTML=rows.length?`<div class="logbox">${rows.map(r=>`<div style="color:${r.error?'var(--danger)':'var(--success)'}">[${fdt(r.scraped_at)}] ${r.source_name} — ${r.new_count} new ${r.error?'❌ '+r.error:'✓'}</div>`).join('')}</div>`:'<div style="color:var(--muted);font-size:.8rem">No logs yet.</div>';
    }catch{}
  }else document.getElementById('la').innerHTML='<div style="color:var(--muted);font-size:.8rem">Logs in API mode only.</div>';
}

async function triggerScrape(){
  if(S.mode!=='api'){toast('API mode only');return;}
  const btn=document.getElementById('sbtn');btn.disabled=true;btn.textContent='⏳ Running…';
  try{const r=await fetch('/api/scrape',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});const d=await r.json();
    document.getElementById('sres').innerHTML=r.ok?'<span style="color:var(--success)">✓ Done</span>':'<span style="color:var(--danger)">'+d.error+'</span>';
  }catch(e){document.getElementById('sres').innerHTML='<span style="color:var(--danger)">'+e.message+'</span>';}
  btn.disabled=false;btn.innerHTML='▶ Run Now';
}

async function loadNotifs(){
  if(S.mode==='api'){try{const r=await fetch('/api/notifications');if(r.ok)S.notifs=await r.json();}catch{}}
  else S.notifs=S.data?.notifications||[];
  const u=S.notifs.filter(n=>!n.read).length;
  document.getElementById('bdot').classList.toggle('on',u>0);
  document.getElementById('nlist').innerHTML=S.notifs.length
    ?S.notifs.map(n=>`<div class="nitem ${n.read?'':'unread'}"><span>🔔</span><div class="ntxt"><div class="ntitle">${esc(n.tender_title||n.message||'Notification')}</div><div class="nsub">${n.deadline?'Deadline: '+fd(n.deadline):''} · ${fdt(n.created_at)}</div></div></div>`).join('')
    :'<div class="nempty">No notifications yet</div>';
}

function toggleNotifPanel(){document.getElementById('npanel').classList.toggle('on');}
function markAllRead(){S.notifs.forEach(n=>n.read=1);document.getElementById('bdot').classList.remove('on');loadNotifs();}

async function toggleStar(id){
  if(S.mode==='api'){await fetch('/api/tenders/'+id+'/star',{method:'PATCH'});}
  else{const t=S.data?.tenders?.find(t=>t.id===id);if(t){t.starred=t.starred?0:1;calcStats(S.data);}}
  updCnts();renderTenders();toast('Updated');
}
async function toggleNotify(id){
  if(S.mode==='api'){const r=await fetch('/api/tenders/'+id+'/notify',{method:'PATCH'});const d=await r.json();toast(d.notify?'Notification on':'off');loadNotifs();}
  else{const t=S.data?.tenders?.find(t=>t.id===id);if(t)t.notify=t.notify?0:1;toast('Updated');}
  renderTenders();
}
function setFilter(st,starred){S.status=st;S.starred=starred;S.pn=1;renderTenders();}
function setSrc(v){S.src=v;S.pn=1;renderTenders();}
function setCat(v){S.cat=v;S.pn=1;renderTenders();}

const CAT_ICONS={
  'works':'🏗️','kerja':'🏗️','pembinaan':'🏗️','construction':'🏗️',
  'services':'🛎️','perkhidmatan':'🛎️','service':'🛎️',
  'supply':'📦','bekalan':'📦','goods':'📦',
  'consultancy':'📐','perundingan':'📐','consulting':'📐',
  'ict':'💻','it':'💻','technology':'💻','teknologi':'💻',
  'maintenance':'🔧','penyelenggaraan':'🔧',
  'equipment':'⚙️','peralatan':'⚙️',
};
function catEmoji(cat){
  if(!cat)return'📋';
  const k=cat.trim().toLowerCase();
  for(const[p,e]of Object.entries(CAT_ICONS)){if(k.includes(p))return e;}
  return'📋';
}
function gp(p){S.pn=p;renderTenders();window.scrollTo({top:0,behavior:'smooth'});}
let st;function onSearch(v){clearTimeout(st);st=setTimeout(()=>{S.q=v;S.pn=1;renderTenders();},280);}

function viewTender(id){
  let t;
  if(S.mode==='api'){t=S._detCache?.[id];}
  if(!t)t=S.data?.tenders?.find(x=>x.id===id);
  if(!t)return;
  const s=SRCS[t.source_id]||{n:'Unknown',i:'📄',c:'#64748b'};
  const hasUrl=t.url&&t.url!=='#';
  document.getElementById('det-title').textContent=t.title||'—';
  document.getElementById('det-edit-btn').style.display='';
  document.getElementById('det-edit-btn').dataset.id=id;
  const link=document.getElementById('det-link');
  if(hasUrl){link.href=t.url;link.classList.remove('disabled');}
  else{link.href='#';link.classList.add('disabled');}
  const daysLeft=t.deadline?Math.ceil((new Date(t.deadline+'T00:00:00')-new Date())/(1000*60*60*24)):null;
  const deadlineNote=daysLeft===null?'':daysLeft<0?`<span style="color:var(--danger);font-size:.74rem">Overdue by ${Math.abs(daysLeft)} day(s)</span>`:daysLeft===0?`<span style="color:var(--warning);font-size:.74rem">Due today</span>`:`<span style="color:var(--success);font-size:.74rem">${daysLeft} day(s) remaining</span>`;
  document.getElementById('det-body').innerHTML=`
    <div class="det-row"><span class="det-lbl">Source</span><span class="det-val"><span class="stag" style="background:${s.c}18;color:${s.c}">${s.i} ${s.n}</span></span></div>
    <div class="det-row"><span class="det-lbl">Status</span><span class="det-val"><span class="pill p-${t.status||'active'}">${cap(t.status||'active')}</span></span></div>
    ${t.category?`<div class="det-row"><span class="det-lbl">Category</span><span class="det-val"><span class="cat-tag">${catEmoji(t.category)} ${esc(cap(t.category))}</span></span></div>`:''}
    ${t.ministry?`<div class="det-row"><span class="det-lbl">Ministry</span><span class="det-val" style="font-size:.82rem">${esc(t.ministry)}</span></div>`:''}
    ${t.ref?`<div class="det-row"><span class="det-lbl">Reference</span><span class="det-val" style="font-family:monospace;font-size:.82rem">${esc(t.ref)}</span></div>`:''}
    <hr class="det-divider">
    <div class="det-row"><span class="det-lbl">Open Date</span><span class="det-val">${t.open_date?fd(t.open_date):'<span style="color:var(--muted)">Not set</span>'}</span></div>
    <div class="det-row"><span class="det-lbl">Deadline</span><span class="det-val">${t.deadline?fd(t.deadline)+' '+deadlineNote:'<span style="color:var(--muted)">Not set</span>'}</span></div>
    <hr class="det-divider">
    <div class="det-row"><span class="det-lbl">Link</span><span class="det-val" style="word-break:break-all;font-size:.78rem">${hasUrl?`<a href="${esc(t.url)}" target="_blank" rel="noopener noreferrer" style="color:var(--primary)">${esc(t.url)}</a>`:'<span style="color:var(--muted)">No link available</span>'}</span></div>
  `;
  document.getElementById('det-overlay').classList.add('on');
}
function closeDet(){document.getElementById('det-overlay').classList.remove('on');}
function openEditFromDet(){const id=Number(document.getElementById('det-edit-btn').dataset.id);closeDet();openModal(id);}
function handleDetLink(e){if(e.currentTarget.classList.contains('disabled')){e.preventDefault();return false;}return true;}

function openModal(id){
  document.getElementById('mtitle').textContent=id?'Edit Tender':'Add Tender';
  document.getElementById('delbtn').style.display=id?'':'none';
  document.getElementById('fid').value=id||'';
  if(!id){['ftitle','fref','furl'].forEach(f=>document.getElementById(f).value='');['fopen','fdeadline'].forEach(f=>document.getElementById(f).value='');document.getElementById('fsrc').value='0';}
  else{const t=S.data?.tenders?.find(t=>t.id===id);if(t){document.getElementById('ftitle').value=t.title||'';document.getElementById('fref').value=t.ref||'';document.getElementById('furl').value=t.url||'';document.getElementById('fopen').value=t.open_date||'';document.getElementById('fdeadline').value=t.deadline||'';document.getElementById('fsrc').value=t.source_id||'0';}}
  document.getElementById('overlay').classList.add('on');
}
function closeModal(){document.getElementById('overlay').classList.remove('on');}
function maybeClose(e){if(e.target===document.getElementById('overlay'))closeModal();}

async function saveTender(e){
  e.preventDefault();
  const id=document.getElementById('fid').value;
  const body={title:document.getElementById('ftitle').value,ref:document.getElementById('fref').value||null,source_id:Number(document.getElementById('fsrc').value),open_date:document.getElementById('fopen').value||null,deadline:document.getElementById('fdeadline').value||null,url:document.getElementById('furl').value||null};
  if(S.mode==='api'){await fetch(id?'/api/tenders/'+id:'/api/tenders',{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});}
  else{if(id){const t=S.data.tenders.find(t=>t.id===Number(id));if(t)Object.assign(t,body);}else{const nid=Math.max(0,...S.data.tenders.map(t=>t.id||0))+1;S.data.tenders.push({id:nid,...body,status:'active',starred:0,notify:0});}calcStats(S.data);updCnts();}
  closeModal();toast(id?'Updated':'Added');renderTenders();
}

async function doDelete(){
  const id=document.getElementById('fid').value;
  if(!id||!confirm('Delete this tender?'))return;
  if(S.mode==='api')await fetch('/api/tenders/'+id,{method:'DELETE'});
  else{S.data.tenders=S.data.tenders.filter(t=>t.id!==Number(id));calcStats(S.data);updCnts();}
  closeModal();toast('Deleted');renderTenders();
}

function updCnts(){const n=S.stats.total||0;document.getElementById('dcnt').textContent=n;document.getElementById('mcnt').textContent=n;}
function openDrawer(){document.getElementById('drawer').classList.add('on');document.getElementById('dov').classList.add('on');}
function closeDrawer(){document.getElementById('drawer').classList.remove('on');document.getElementById('dov').classList.remove('on');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2300);}
function fd(s){if(!s)return'—';try{return new Date(s+'T00:00:00').toLocaleDateString('en-MY',{day:'2-digit',month:'short',year:'numeric'});}catch{return s;}}
function fdt(s){if(!s)return'—';try{return new Date(s).toLocaleString('en-MY',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}catch{return s;}}
function cap(s){return s?s[0].toUpperCase()+s.slice(1):'';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.addEventListener('click',e=>{
  const p=document.getElementById('npanel');
  if(p.classList.contains('on')&&!p.contains(e.target)&&!e.target.closest('.notif-btn'))p.classList.remove('on');
});

boot();
</script>
</body>
